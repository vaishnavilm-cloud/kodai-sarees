<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0">
<title>Lalitha's Cotton Sarees</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#0A0806; --surface:#141210; --surface2:#1C1916;
  --border:rgba(242,232,216,0.08); --rust:#C4462A; --amber:#D4943A;
  --sage:#5C7A55; --cream:#F2E8D8; --muted:rgba(242,232,216,0.45);
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
body{background:var(--bg);color:var(--cream);font-family:'DM Sans',sans-serif;font-weight:300;min-height:100vh;-webkit-font-smoothing:antialiased;}

.topbar{position:fixed;top:0;left:0;right:0;z-index:100;background:rgba(10,8,6,0.88);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(–border);padding:0 16px;height:52px;display:flex;align-items:center;justify-content:space-between;}
.topbar-left{display:flex;align-items:center;gap:10px;}
.topbar-dot{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(–rust),var(–amber));display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:700;color:#fff;flex-shrink:0;}
.topbar-name{font-family:‘Playfair Display’,serif;font-style:italic;font-size:16px;color:var(–cream);}
.topbar-count{font-size:11px;color:var(–muted);}
.topbar-count strong{color:var(–amber);font-weight:500;}

.profile{padding:72px 20px 20px;border-bottom:1px solid var(–border);}
.profile-row{display:flex;align-items:center;gap:20px;margin-bottom:16px;}
.profile-avatar{width:72px;height:72px;border-radius:50%;flex-shrink:0;overflow:hidden;box-shadow:0 0 0 2px var(–bg),0 0 0 3.5px var(–amber);}
.profile-avatar img{width:100%;height:100%;object-fit:cover;display:block;}
.profile-stats{display:flex;gap:24px;}
.stat{text-align:center;}
.stat-num{font-size:17px;font-weight:500;color:var(–cream);}
.stat-label{font-size:10px;color:var(–muted);letter-spacing:0.05em;margin-top:1px;}
.profile-name{font-family:‘Playfair Display’,serif;font-size:15px;font-weight:700;margin-bottom:3px;}
.profile-bio{font-size:12px;color:var(–muted);line-height:1.5;}
.profile-bio span{color:var(–amber);}

.stripe{display:flex;height:3px;}
.stripe i{flex:1;}
.stripe .s1{background:var(–rust);}.stripe .s2{background:var(–amber);}.stripe .s3{background:var(–sage);}

.tabs{display:flex;border-bottom:1px solid var(–border);position:sticky;top:52px;z-index:90;background:rgba(10,8,6,0.92);backdrop-filter:blur(16px);overflow-x:auto;scrollbar-width:none;}
.tabs::-webkit-scrollbar{display:none;}
.tab{flex-shrink:0;padding:11px 16px;font-size:12px;font-weight:400;letter-spacing:0.04em;color:var(–muted);border:none;background:transparent;cursor:pointer;border-bottom:2px solid transparent;transition:all 0.2s;white-space:nowrap;}
.tab.active{color:var(–amber);border-bottom-color:var(–amber);}
.tab:hover:not(.active){color:var(–cream);}

.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;padding:2px;}
@media(min-width:600px){.grid{grid-template-columns:repeat(4,1fr);}}

.tile{position:relative;cursor:pointer;overflow:hidden;aspect-ratio:3/4;background:var(–surface);}
.tile img{width:100%;height:100%;object-fit:contain;padding:6px;transition:transform 0.4s ease;display:block;}
.tile:hover img{transform:scale(1.04);}
.tile-placeholder{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;padding:12px;text-align:center;background:var(–surface2);}
.tile-placeholder-icon{font-size:22px;opacity:0.2;}
.tile-placeholder-name{font-family:‘Playfair Display’,serif;font-size:11px;color:var(–muted);line-height:1.3;}
.tile-overlay{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(10,8,6,0.92) 0%,rgba(10,8,6,0.4) 55%,transparent 100%);padding:28px 8px 8px;}
.tile-name{font-family:‘Playfair Display’,serif;font-size:12px;line-height:1.25;}
.tile-price{font-size:10px;color:var(–amber);margin-top:2px;font-weight:500;}
.tile-badges{position:absolute;top:6px;left:6px;display:flex;flex-direction:column;gap:4px;}
.badge{font-size:8px;font-weight:600;letter-spacing:0.07em;text-transform:uppercase;padding:2px 6px;border-radius:3px;width:fit-content;}
.badge-sold{background:rgba(196,70,42,0.85);color:#fff;}
.badge-blouse{background:rgba(92,122,85,0.85);color:#fff;}
.sold-veil{position:absolute;inset:0;background:rgba(10,8,6,0.5);display:flex;align-items:center;justify-content:center;}
.sold-stamp{border:1.5px solid var(–rust);color:var(–rust);font-size:11px;font-weight:700;letter-spacing:0.18em;text-transform:uppercase;padding:4px 10px;transform:rotate(-15deg);background:rgba(10,8,6,0.5);}

.backdrop{position:fixed;inset:0;background:rgba(0,0,0,0.72);z-index:200;opacity:0;pointer-events:none;transition:opacity 0.28s;}
.backdrop.open{opacity:1;pointer-events:all;}
.sheet{position:fixed;bottom:0;left:0;right:0;z-index:201;max-height:93vh;background:var(–surface);border-radius:20px 20px 0 0;transform:translateY(100%);transition:transform 0.34s cubic-bezier(0.32,0.72,0,1);display:flex;flex-direction:column;overflow:hidden;}
.sheet.open{transform:translateY(0);}
@media(min-width:560px){.sheet{left:50%;right:auto;width:440px;transform:translateX(-50%) translateY(100%);border-radius:20px 20px 0 0;}.sheet.open{transform:translateX(-50%) translateY(0);}}
.sheet-handle{width:36px;height:4px;border-radius:2px;background:var(–border);margin:12px auto 0;flex-shrink:0;}
.sheet-fixed{flex-shrink:0;position:relative;}
.sheet-scroll{overflow-y:auto;flex:1;scrollbar-width:none;}
.sheet-scroll::-webkit-scrollbar{display:none;}

.carousel{position:relative;aspect-ratio:3/4;background:var(–bg);overflow:hidden;max-height:52vh;}
.c-track{display:flex;height:100%;transition:transform 0.32s cubic-bezier(0.4,0,0.2,1);}
.c-track img{flex-shrink:0;width:100%;height:100%;object-fit:contain;display:block;}
.c-placeholder{flex-shrink:0;width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;color:var(–muted);}
.c-placeholder-icon{font-size:40px;opacity:0.18;}
.c-placeholder p{font-size:12px;letter-spacing:0.06em;}
.c-btn{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:34px;border-radius:50%;background:rgba(10,8,6,0.55);border:1px solid rgba(242,232,216,0.12);color:var(–cream);font-size:18px;line-height:1;display:flex;align-items:center;justify-content:center;cursor:pointer;backdrop-filter:blur(6px);transition:background 0.18s;}
.c-btn:hover{background:rgba(10,8,6,0.8);}
.c-btn.prev{left:10px;}.c-btn.next{right:10px;}
.c-btn.hide{opacity:0;pointer-events:none;}
.c-dots{position:absolute;bottom:10px;left:0;right:0;display:flex;justify-content:center;gap:5px;}
.c-dot{width:5px;height:5px;border-radius:50%;background:rgba(242,232,216,0.28);cursor:pointer;transition:all 0.2s;}
.c-dot.on{background:var(–amber);width:16px;border-radius:3px;}
.c-label{position:absolute;bottom:0;left:0;right:0;background:linear-gradient(to top,rgba(10,8,6,0.7),transparent);padding:20px 12px 8px;font-size:10px;color:var(–muted);text-align:center;letter-spacing:0.07em;}

.buy-bar{flex-shrink:0;padding:10px 16px;background:var(–surface);border-bottom:1px solid var(–border);display:flex;align-items:center;justify-content:space-between;gap:12px;}
.buy-bar-info{min-width:0;}
.buy-bar-name{font-family:‘Playfair Display’,serif;font-size:15px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.buy-bar-price{font-size:13px;color:var(–amber);font-weight:500;margin-top:1px;}
.buy-btn{flex-shrink:0;display:flex;align-items:center;gap:7px;padding:10px 16px;border-radius:10px;font-family:‘DM Sans’,sans-serif;font-size:13px;font-weight:600;cursor:pointer;text-decoration:none;border:none;background:#25D366;color:#fff;transition:background 0.18s;white-space:nowrap;}
.buy-btn:hover{background:#1ebe5d;}
.buy-btn svg{width:16px;height:16px;fill:#fff;flex-shrink:0;}
.buy-btn.sold-btn{background:var(–surface2);color:var(–muted);border:1px solid var(–border);cursor:default;pointer-events:none;}

.sheet-body{padding:16px 18px 32px;}
.sheet-pills{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}
.pill{font-size:9px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:4px 10px;border-radius:4px;}
.pill-sold{background:rgba(196,70,42,0.12);color:var(–rust);border:1px solid rgba(196,70,42,0.3);}
.pill-blouse{background:rgba(92,122,85,0.12);color:#85b87e;border:1px solid rgba(92,122,85,0.3);}
.pill-care{background:rgba(212,148,58,0.08);color:var(–amber);border:1px solid rgba(212,148,58,0.2);}
.sheet-desc{font-size:13px;line-height:1.7;color:var(–muted);margin-bottom:14px;}
.sheet-type-row{font-size:11px;color:var(–muted);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:14px;}
.sheet-tags{display:flex;flex-wrap:wrap;gap:5px;}
.stag{font-size:10px;padding:3px 9px;border-radius:100px;background:var(–surface2);color:var(–muted);border:1px solid var(–border);}
.close-x{position:absolute;top:16px;right:14px;z-index:5;width:30px;height:30px;border-radius:50%;background:var(–surface2);border:1px solid var(–border);color:var(–muted);font-size:14px;display:flex;align-items:center;justify-content:center;cursor:pointer;}

/* Loading state */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;color:var(–muted);}
.loading-dots{display:flex;gap:6px;}
.loading-dots span{width:7px;height:7px;border-radius:50%;background:var(–amber);animation:pulse 1.2s ease-in-out infinite;}
.loading-dots span:nth-child(2){animation-delay:0.2s;}
.loading-dots span:nth-child(3){animation-delay:0.4s;}
@keyframes pulse{0%,80%,100%{opacity:0.2;transform:scale(0.8);}40%{opacity:1;transform:scale(1);}}

.empty{padding:60px 20px;text-align:center;color:var(–muted);}
.empty-icon{font-size:36px;opacity:0.25;margin-bottom:10px;}
footer{padding:20px 16px;text-align:center;font-size:10px;color:rgba(242,232,216,0.2);letter-spacing:0.08em;border-top:1px solid var(–border);margin-top:4px;}
</style>

</head>

<script>
const WA = '919444356353';
const JSON_URL = 'https://cdn.jsdelivr.net/gh/vaishnavilm-cloud/kodai-sarees@main/sarees_db.json';
const PHOTO_LABELS = ['Main drape','Pallu detail','Border close-up','Blouse fabric'];
let DB = [];
let cIdx = 0, cTotal = 0;
let currentFilter = 'all';

// ── FETCH DB ──
async function loadDB() {
  try {
    // Cache-bust so sold updates show immediately
    const res = await fetch(JSON_URL + '?t=' + Date.now());
    DB = await res.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('grid').style.display = 'grid';
    updateStats();
    renderGrid(currentFilter);
  } catch(e) {
    document.getElementById('loading').innerHTML = '<div style="font-size:13px;color:var(--rust)">Could not load sarees. Please refresh.</div>';
  }
}

function updateStats() {
  const avail = DB.filter(s=>!s.sold).length;
  document.getElementById('availCount').textContent = avail;
  document.getElementById('statTotal').textContent = DB.length;
  document.getElementById('statAvail').textContent = avail;
  document.getElementById('statSold').textContent = DB.filter(s=>s.sold).length;
}

function renderGrid(filter) {
  const grid = document.getElementById('grid');
  const empty = document.getElementById('empty');
  grid.innerHTML = '';
  const list = DB.filter(s => {
    if (filter === 'all') return true;
    if (filter === 'with_blouse') return s.with_blouse;
    if (filter === 'under1500') return s.price < 1500;
    if (filter === 'Checks') return s.tags && s.tags.includes('Checks');
    if (filter === 'Jaipuri Cotton') return s.type === 'Jaipuri Cotton' && !(s.tags && s.tags.includes('Checks'));
    return s.type === filter;
  });
  if (!list.length) { empty.style.display='block'; grid.style.display='none'; return; }
  empty.style.display='none'; grid.style.display='grid';
  list.forEach(s => {
    const tile = document.createElement('div');
    tile.className = 'tile';
    tile.onclick = () => openSheet(s);
    const hasPhoto = s.photos && s.photos.length > 0;
    if (hasPhoto) {
      const img = document.createElement('img');
      img.src = s.photos[0]; img.alt = s.name; img.loading = 'lazy';
      tile.appendChild(img);
      const ov = document.createElement('div');
      ov.className = 'tile-overlay';
      ov.innerHTML = `<div class="tile-name">${s.name}</div><div class="tile-price">₹${s.price.toLocaleString('en-IN')}</div>`;
      tile.appendChild(ov);
    } else {
      const ph = document.createElement('div');
      ph.className = 'tile-placeholder';
      ph.innerHTML = `<div class="tile-placeholder-icon">🪡</div><div class="tile-placeholder-name">${s.name}<br><span style="color:var(--amber);font-size:10px">₹${s.price.toLocaleString('en-IN')}</span></div>`;
      tile.appendChild(ph);
    }
    const bdg = document.createElement('div'); bdg.className = 'tile-badges';
    if (s.sold) bdg.innerHTML += `<span class="badge badge-sold">Sold</span>`;
    if (s.with_blouse) bdg.innerHTML += `<span class="badge badge-blouse">+Blouse</span>`;
    tile.appendChild(bdg);
    if (s.sold) { const v=document.createElement('div'); v.className='sold-veil'; v.innerHTML=`<div class="sold-stamp">Sold</div>`; tile.appendChild(v); }
    grid.appendChild(tile);
  });
}

document.getElementById('tabs').addEventListener('click', e => {
  const tab = e.target.closest('.tab');
  if (!tab) return;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  tab.classList.add('active');
  currentFilter = tab.dataset.f;
  renderGrid(currentFilter);
});

function openSheet(s) {
  buildCarousel(s);
  document.getElementById('bbName').textContent = s.name;
  document.getElementById('bbPrice').textContent = '₹' + s.price.toLocaleString('en-IN');
  const btn = document.getElementById('buyBtn');
  if (s.sold) {
    btn.className='buy-btn sold-btn'; btn.removeAttribute('href'); btn.innerHTML='Sold Out';
  } else {
    btn.className='buy-btn';
    const msg=encodeURIComponent(`Hi! I'm interested in the ${s.name} (${s.type}, ₹${s.price.toLocaleString('en-IN')}). Is it available?`);
    btn.href=`https://wa.me/${WA}?text=${msg}`;
    btn.innerHTML=`<svg viewBox="0 0 24 24" style="width:16px;height:16px;fill:#fff;flex-shrink:0"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>Buy Now`;
  }
  const pills=document.getElementById('sPills'); pills.innerHTML='';
  if (s.sold) pills.innerHTML+=`<span class="pill pill-sold">Sold</span>`;
  if (s.with_blouse) pills.innerHTML+=`<span class="pill pill-blouse">Includes Blouse Fabric</span>`;
  pills.innerHTML+=`<span class="pill pill-care">Machine Washable</span><span class="pill pill-care">Colourfast</span>`;
  document.getElementById('sType').textContent = s.type + (s.with_blouse ? ' · With blouse fabric' : '');
  document.getElementById('sDesc').textContent = s.description;
  document.getElementById('sTags').innerHTML = (s.tags||[]).map(t=>`<span class="stag">${t}</span>`).join('');
  document.querySelector('.sheet-scroll').scrollTop = 0;
  document.getElementById('sheet').classList.add('open');
  document.getElementById('backdrop').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeSheet() {
  document.getElementById('sheet').classList.remove('open');
  document.getElementById('backdrop').classList.remove('open');
  document.body.style.overflow='';
}

function buildCarousel(s) {
  const track=document.getElementById('cTrack'), dots=document.getElementById('cDots');
  const label=document.getElementById('cLabel'), prev=document.getElementById('cPrev'), next=document.getElementById('cNext');
  track.innerHTML=''; dots.innerHTML=''; cIdx=0;
  const photos=s.photos||[];
  if (!photos.length) {
    cTotal=1;
    track.innerHTML='<div class="c-placeholder"><div class="c-placeholder-icon">🪡</div><p>Photos coming soon</p></div>';
    label.textContent=''; prev.classList.add('hide'); next.classList.add('hide'); return;
  }
  cTotal=photos.length;
  photos.forEach((src,i)=>{
    const img=document.createElement('img'); img.src=src; img.alt=s.name; track.appendChild(img);
    if (cTotal>1) { const d=document.createElement('div'); d.className='c-dot'+(i===0?' on':''); d.onclick=()=>goTo(i); dots.appendChild(d); }
  });
  label.textContent=cTotal>1?PHOTO_LABELS[0]:'';
  prev.classList.add('hide'); next.classList.toggle('hide',cTotal<=1);
}

function goTo(i) {
  cIdx=Math.max(0,Math.min(i,cTotal-1));
  document.getElementById('cTrack').style.transform=`translateX(-${cIdx*100}%)`;
  document.querySelectorAll('#cDots .c-dot').forEach((d,j)=>d.classList.toggle('on',j===cIdx));
  document.getElementById('cPrev').classList.toggle('hide',cIdx===0);
  document.getElementById('cNext').classList.toggle('hide',cIdx===cTotal-1);
  document.getElementById('cLabel').textContent=PHOTO_LABELS[cIdx]||'';
}
function cStep(d){goTo(cIdx+d);}

(function(){
  let sx=0;
  const c=document.getElementById('carousel');
  c.addEventListener('touchstart',e=>{sx=e.touches[0].clientX;},{passive:true});
  c.addEventListener('touchend',e=>{const dx=e.changedTouches[0].clientX-sx; if(Math.abs(dx)>40)cStep(dx<0?1:-1);},{passive:true});
})();

document.addEventListener('keydown',e=>{if(e.key==='Escape')closeSheet();});
loadDB();
</script>
